name: Deploy Staging
on:
  push:
    branches: ['beta/iteration-*']
    paths-ignore:
      - '.github/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-staging-group
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - name: Build and push
        run: |
          docker build -t registry.fly.io/${{ secrets.FLY_APP_NAME_STAGING }}:${{ github.sha }} .
          docker push registry.fly.io/${{ secrets.FLY_APP_NAME_STAGING }}:${{ github.sha }}
      - name: Trigger deploy
        run: |
          curl -f -X POST "${{ secrets.VENICE_DEPLOY_URL }}" \
            -H "Authorization: Bearer ${{ secrets.VENICE_DEPLOY_TOKEN_STAGING }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo_name\":\"$(basename ${{ github.repository }})\",\"image_ref\":\"registry.fly.io/${{ secrets.FLY_APP_NAME_STAGING }}:${{ github.sha }}\",\"commit_sha\":\"${{ github.sha }}\",\"environment\":\"staging\"}"
